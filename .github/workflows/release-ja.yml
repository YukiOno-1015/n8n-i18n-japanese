---
name: mainマージ後リリース

"on":
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve upstream n8n version
        id: version
        run: |
          set -euo pipefail

          if [[ -f .n8n-upstream-version ]]; then
            raw=$(cat .n8n-upstream-version | tr -d '[:space:]')
          else
            raw=$(grep -E '^\s*image:\s*n8nio/n8n:' docker-compose.yml | sed -E 's#^\s*image:\s*n8nio/n8n:##')
          fi

          raw="$(echo "$raw" | tr -d '[:space:]')"

          if [[ "$raw" =~ ^n8n@[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag="$raw"
            version="${raw#n8n@}"
          elif [[ "$raw" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="$raw"
            tag="n8n@$version"
          else
            echo "Invalid n8n version source: '$raw'"
            echo "Use explicit version format 'x.y.z' or 'n8n@x.y.z' in .n8n-upstream-version or docker-compose.yml"
            exit 1
          fi

          echo "n8n_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "n8n_version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute ja release tag
        id: tag
        run: |
          set -euo pipefail
          base="${{ steps.version.outputs.n8n_version }}-ja"
          latest=$(git tag -l "${base}.*" | sed -E 's#.*-ja\.##' | sort -n | tail -n1)

          if [[ -z "$latest" ]]; then
            next=1
          else
            next=$((latest + 1))
          fi

          full_tag="${base}.${next}"
          echo "tag=$full_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=n8n ${{ steps.version.outputs.n8n_version }} 日本語化 ${full_tag}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x

      - name: Setup corepack and pnpm
        run: |
          set -euo pipefail
          npm i -g corepack@0.31
          corepack enable

      - name: Checkout n8n source
        uses: actions/checkout@v5
        with:
          repository: n8n-io/n8n
          ref: ${{ steps.version.outputs.n8n_tag }}
          path: n8n

      - name: Install n8n dependencies
        run: pnpm install --frozen-lockfile
        working-directory: n8n

      - name: Resolve editor-ui directory
        id: editorui
        run: |
          set -euo pipefail
          new_path="$GITHUB_WORKSPACE/n8n/packages/frontend/editor-ui"
          old_path="$GITHUB_WORKSPACE/n8n/packages/editor-ui"

          if [[ -d "$new_path" ]]; then
            echo "flag=new" >> "$GITHUB_OUTPUT"
            echo "dir=$new_path" >> "$GITHUB_OUTPUT"
          else
            echo "flag=old" >> "$GITHUB_OUTPUT"
            echo "dir=$old_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve locale directory
        id: locales
        run: |
          set -euo pipefail
          modern_locale_path="$GITHUB_WORKSPACE/n8n/packages/frontend/@n8n/i18n/src/locales"
          new_locale_path="${{ steps.editorui.outputs.dir }}/src/plugins/i18n/locales"
          old_locale_path="$GITHUB_WORKSPACE/n8n/packages/editor-ui/src/plugins/i18n/locales"

          if [[ -d "$modern_locale_path" ]]; then
            echo "dir=$modern_locale_path" >> "$GITHUB_OUTPUT"
          elif [[ -d "$new_locale_path" ]]; then
            echo "dir=$new_locale_path" >> "$GITHUB_OUTPUT"
          elif [[ -d "$old_locale_path" ]]; then
            echo "dir=$old_locale_path" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to find locale directory in checked out n8n source" >&2
            exit 1
          fi

      - name: Apply Japanese locale and patch
        run: |
          set -euo pipefail
          cp -r "$GITHUB_WORKSPACE/languages"/* "${{ steps.locales.outputs.dir }}/"

          patch_applied=false
          for patch in fix_editor-ui.patch fix_editor-ui.old.patch; do
            if git -C "$GITHUB_WORKSPACE/n8n" apply --check "$GITHUB_WORKSPACE/$patch" >/dev/null 2>&1; then
              git -C "$GITHUB_WORKSPACE/n8n" apply "$GITHUB_WORKSPACE/$patch"
              echo "Applied patch: $patch"
              patch_applied=true
              break
            fi
          done

          if [[ "$patch_applied" == "false" ]]; then
            echo "No compatible editor-ui patch found. Skip patch apply."
          fi

      - name: Build vitest config package
        run: pnpm --filter @n8n/vitest-config build
        working-directory: n8n

      - name: Build editor-ui
        run: pnpm build
        working-directory: ${{ steps.editorui.outputs.dir }}

      - name: Export editor-ui-dist
        run: |
          set -euo pipefail
          rm -rf editor-ui-dist
          cp -r "${{ steps.editorui.outputs.dir }}/dist" editor-ui-dist
      - name: Create editor-ui archive
        run: |
          set -euo pipefail
          tar -czf editor-ui.tar.gz editor-ui-dist

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ja image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.n8n-ja
          push: true
          build-args: |
            N8N_VERSION=${{ steps.version.outputs.n8n_version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/n8n-ja:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/n8n-ja:latest-ja

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.release_name }}
          body: |
            n8n `${{ steps.version.outputs.n8n_version }}` 対応の日本語化リリースです。

            - Docker image: `${{ secrets.DOCKERHUB_USERNAME }}/n8n-ja:${{ steps.tag.outputs.tag }}`
            - `ja.json` を添付
            - `editor-ui.tar.gz` を添付
          draft: false
          prerelease: false
          files: |
            languages/ja.json
            editor-ui.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
