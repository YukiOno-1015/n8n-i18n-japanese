services:
  n8ntest:
    image: n8nio/n8n:latest
    container_name: n8ntest
    ports:
      - "15678:5678"
    environment:
      - N8N_DEFAULT_LOCALE=ja
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./editor-ui-dist:/usr/local/lib/node_modules/n8n/node_modules/n8n-editor-ui/dist
    stdin_open: true
    tty: true
    restart: unless-stopped

  translator:
    build:
      context: .
      dockerfile: Dockerfile
    image: n8n-i18n-japanese-translator:latest
    container_name: n8n-i18n-translator
    env_file:
      - .env
    volumes:
      - ./languages:/app/languages
      - ./script:/app/script
    command: [ "script/translate.js" ]
    restart: "no"
